<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
  <title>Queue Manager — Karafun Bridge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1a2e;
      --surface:  #16213e;
      --surface2: #0f3460;
      --border:   #2a2a4a;
      --brand:    #e85d26;
      --text:     #e8e8f0;
      --muted:    #8888aa;
      --success:  #22c55e;
      --success-dk: #16a34a;
      --error:    #ef4444;
      --error-dk: #dc2626;
      --warning:  #eab308;
      --radius:   8px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
    }

    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-green  { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .dot-yellow { background: var(--warning); box-shadow: 0 0 6px var(--warning); }
    .dot-red    { background: var(--error);   box-shadow: 0 0 6px var(--error); }

    .status-label {
      font-size: 12px;
      font-weight: 500;
    }

    .mode-badge {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      border-radius: 12px;
      background: var(--surface2);
      color: var(--muted);
    }

    /* ── Header ── */
    header {
      padding: 16px 20px 0;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    header p {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    /* ── Song list ── */
    .song-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .song-list::-webkit-scrollbar { width: 6px; }
    .song-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 8px;
      padding: 40px;
      text-align: center;
    }

    .empty-icon {
      font-size: 40px;
      opacity: 0.4;
    }

    .empty-state p { font-size: 13px; }

    /* ── Song card ── */
    .song-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .song-info {
      flex: 1;
      min-width: 0;
    }

    .song-title {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-artist {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-singer {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--brand);
    }

    .no-karafun-id {
      font-size: 10px;
      color: var(--warning);
      margin-top: 2px;
    }

    .song-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .btn-action {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn-add  { background: var(--success); color: #fff; }
    .btn-add:hover { background: var(--success-dk); }
    .btn-add:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-skip { background: transparent; color: var(--error); border: 1px solid var(--error); }
    .btn-skip:hover { background: var(--error); color: #fff; }
    .btn-skip:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Auto mode overlay ── */
    .auto-mode-notice {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 8px;
      color: var(--muted);
      text-align: center;
    }

    .auto-mode-notice .icon { font-size: 32px; }

    /* ── Footer ── */
    footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: var(--surface);
    }

    .pending-count {
      font-size: 12px;
      color: var(--muted);
    }

    .pending-count strong { color: var(--text); }

    .error-toast {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--error);
      color: #fff;
      padding: 8px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }
    .error-toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="layout">

    <!-- Status Bar -->
    <div class="status-bar" id="statusBar">
      <div class="status-dot dot-red" id="kDot"></div>
      <span class="status-label" id="kLabel">Karafun: Not Running</span>
      <div class="status-dot dot-red" id="sDot" style="margin-left:12px;"></div>
      <span class="status-label" id="sLabel">Supabase: Disconnected</span>
      <span class="mode-badge" id="modeBadge">Confirm Mode</span>
    </div>

    <!-- Header -->
    <header>
      <h1>Pending Songs</h1>
      <p id="headerSub">Songs waiting to be added to Karafun</p>
    </header>

    <!-- List -->
    <div class="song-list" id="songList">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🎤</div>
        <p>No pending songs.</p>
        <p>New requests will appear here when singers submit songs.</p>
      </div>
    </div>

    <footer>
      <span class="pending-count" id="pendingCount">
        <strong>0</strong> songs pending
      </span>
    </footer>
  </div>

  <div class="error-toast" id="errorToast"></div>

  <script>
    let currentSongs = [];
    let currentStatus = {};
    let actionInProgress = new Set();

    // ── Initial data load ───────────────────────────────────────────────────
    Promise.all([
      window.bridge.getSongs(),
      window.bridge.getStatus(),
    ]).then(([songs, status]) => {
      renderSongs(songs);
      renderStatus(status);
    });

    // ── Real-time updates ───────────────────────────────────────────────────
    window.bridge.onSongsUpdated((songs) => renderSongs(songs));
    window.bridge.onStatusUpdated((status) => renderStatus(status));

    window.addEventListener('beforeunload', () => {
      window.bridge.removeSongsListener();
      window.bridge.removeStatusListener();
    });

    // ── Render helpers ──────────────────────────────────────────────────────
    function renderStatus(status) {
      currentStatus = status || {};

      const kDot   = document.getElementById('kDot');
      const kLabel = document.getElementById('kLabel');
      const sDot   = document.getElementById('sDot');
      const sLabel = document.getElementById('sLabel');
      const badge  = document.getElementById('modeBadge');
      const sub    = document.getElementById('headerSub');

      kDot.className   = 'status-dot ' + (status.karafunConnected ? 'dot-green' : 'dot-yellow');
      kLabel.textContent = 'Karafun: ' + (status.karafunConnected ? 'Connected' : 'Not Running');

      sDot.className   = 'status-dot ' + (status.supabaseConnected ? 'dot-green' : 'dot-red');
      sLabel.textContent = 'Supabase: ' + (status.supabaseConnected ? 'Connected' : 'Disconnected');

      const isAuto = status.mode === 'auto';
      badge.textContent = isAuto ? 'Auto-Queue' : 'Confirm Mode';
      sub.textContent = isAuto
        ? 'Auto mode is on — songs queue directly in Karafun'
        : 'Songs waiting for your approval';
    }

    function renderSongs(songs) {
      currentSongs = songs || [];
      const list = document.getElementById('songList');
      const empty = document.getElementById('emptyState');
      const count = document.getElementById('pendingCount');

      // Remove old cards (keep empty state node)
      Array.from(list.querySelectorAll('.song-card')).forEach((el) => el.remove());

      const n = currentSongs.length;
      count.innerHTML = `<strong>${n}</strong> song${n !== 1 ? 's' : ''} pending`;

      if (n === 0) {
        empty.style.display = 'flex';
        return;
      }
      empty.style.display = 'none';

      currentSongs.forEach((song) => {
        const card = buildCard(song);
        list.appendChild(card);
      });
    }

    function buildCard(song) {
      const hasKarafunId = !!song.karafun_song_id;
      const inProgress   = actionInProgress.has(song.id);
      const kConnected   = currentStatus.karafunConnected;
      const canAdd       = hasKarafunId && kConnected && !inProgress;

      const card = document.createElement('div');
      card.className = 'song-card';
      card.dataset.id = song.id;

      card.innerHTML = `
        <div class="song-info">
          <div class="song-title">${esc(song.song_title || 'Unknown Title')}</div>
          <div class="song-artist">${esc(song.song_artist || 'Unknown Artist')}</div>
          <div class="song-singer">
            <span>🎤</span> ${esc(song.singer_name || 'Unknown Singer')}
          </div>
          ${!hasKarafunId
            ? '<div class="no-karafun-id">⚠ No Karafun ID — cannot auto-add</div>'
            : ''}
        </div>
        <div class="song-actions">
          <button
            class="btn-action btn-add"
            data-id="${song.id}"
            ${canAdd ? '' : 'disabled'}
            title="${!kConnected ? 'Karafun is not running' : !hasKarafunId ? 'No Karafun ID set for this song' : 'Add to Karafun queue'}"
          >
            ${inProgress ? '…' : 'ADD TO KARAFUN'}
          </button>
          <button
            class="btn-action btn-skip"
            data-id="${song.id}"
            ${inProgress ? 'disabled' : ''}
          >
            SKIP
          </button>
        </div>
      `;

      // Add button
      card.querySelector('.btn-add').addEventListener('click', async () => {
        await doAction(song.id, 'add');
      });

      // Skip button
      card.querySelector('.btn-skip').addEventListener('click', async () => {
        await doAction(song.id, 'skip');
      });

      return card;
    }

    async function doAction(songId, type) {
      if (actionInProgress.has(songId)) return;
      actionInProgress.add(songId);
      refreshCard(songId);

      let result;
      if (type === 'add') {
        result = await window.bridge.addSong(songId);
      } else {
        result = await window.bridge.skipSong(songId);
      }

      actionInProgress.delete(songId);

      if (!result || !result.ok) {
        showError(result ? result.error : 'Unknown error');
        refreshCard(songId);
      }
      // Main will push songs-updated event so list re-renders automatically
    }

    function refreshCard(songId) {
      const card = document.querySelector(`.song-card[data-id="${songId}"]`);
      if (!card) return;
      const song = currentSongs.find((s) => s.id === songId);
      if (!song) return;
      const newCard = buildCard(song);
      card.replaceWith(newCard);
    }

    function showError(msg) {
      const toast = document.getElementById('errorToast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
