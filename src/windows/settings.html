<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
  <title>Settings — Karafun Bridge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1a2e;
      --surface:  #16213e;
      --border:   #2a2a4a;
      --brand:    #e85d26;
      --brand-dk: #c44d1e;
      --text:     #e8e8f0;
      --muted:    #8888aa;
      --success:  #22c55e;
      --error:    #ef4444;
      --purple:   #7c3aed;
      --radius:   8px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px; line-height: 1.5; }

    .container { display: flex; flex-direction: column; height: 100%; }

    /* ── Tab bar ── */
    .tab-bar { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .tab-btn { flex: 1; padding: 12px 0; background: none; border: none; color: var(--muted);
      font-size: 13px; font-weight: 600; cursor: pointer; transition: color 0.15s;
      border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--brand); }

    /* ── Tab panels ── */
    .tab-panel { display: none; flex: 1; flex-direction: column; overflow-y: auto; padding: 20px 24px; }
    .tab-panel.active { display: flex; }

    /* ── Fields ── */
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
    label { font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted); }
    select, input[type=text] {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); padding: 10px 12px; font-size: 14px; width: 100%;
      outline: none; transition: border-color 0.15s; }
    select:focus, input:focus { border-color: var(--brand); }
    select:disabled { opacity: 0.5; }
    select option { background: var(--surface); color: var(--text); }
    .field-hint { font-size: 11px; color: var(--muted); }

    /* ── Mode toggle ── */
    .mode-toggle { display: flex; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
    .mode-toggle button { flex: 1; padding: 10px; background: var(--surface); color: var(--muted);
      border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: background 0.15s, color 0.15s; }
    .mode-toggle button.active { background: var(--brand); color: #fff; }
    .mode-toggle button:not(.active):hover { background: var(--border); color: var(--text); }

    /* ── Buttons ── */
    .btn-save { width: 100%; padding: 12px; background: var(--brand); color: #fff;
      border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.15s; margin-top: auto; }
    .btn-save:hover { background: var(--brand-dk); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn { padding: 9px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 600;
      cursor: pointer; border: none; transition: background 0.15s, opacity 0.15s; }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--brand-dk); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { background: var(--border); color: var(--text); }
    .btn-danger { background: transparent; color: var(--error); border: 1px solid rgba(239,68,68,0.4); }
    .btn-danger:hover:not(:disabled) { background: rgba(239,68,68,0.08); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Status badge ── */
    .connection-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px;
      font-weight: 600; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border);
      background: rgba(255,255,255,0.04); color: var(--muted); }
    .connection-badge.connected { color: var(--success); border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.08); }
    .connection-badge.error { color: var(--error); border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.08); }
    .connection-badge.connecting { color: #f59e0b; border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.08); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    /* ── Session controls (Settings tab) ── */
    .session-input { display: block; width: 100%; padding: 9px 12px; border: 1px solid var(--border);
      border-radius: var(--radius); background: var(--surface); color: var(--text);
      font-size: 13px; margin-bottom: 7px; outline: none; transition: border-color 0.15s; }
    .session-input:focus { border-color: var(--brand); }
    .btn-session { width: 100%; padding: 10px; background: var(--purple); color: #fff; border: none;
      border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background 0.15s; margin-top: 2px; }
    .btn-session:hover:not(:disabled) { background: #6d28d9; }
    .btn-session:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-end-session { width: 100%; padding: 10px; background: transparent; color: var(--error);
      border: 1px solid rgba(239,68,68,0.4); border-radius: var(--radius); font-size: 13px;
      font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .btn-end-session:hover { background: rgba(239,68,68,0.08); }
    .session-badge { display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      border-radius: var(--radius); background: rgba(124,58,237,0.12);
      border: 1px solid rgba(124,58,237,0.35); font-size: 13px; font-weight: 600;
      color: #a78bfa; margin-bottom: 6px; }
    .session-dot { width: 8px; height: 8px; border-radius: 50%; background: #a78bfa; flex-shrink: 0;
      animation: session-pulse 2s ease-out infinite; }
    @keyframes session-pulse {
      0%  { box-shadow: 0 0 0 0 rgba(167,139,250,0.6); }
      70% { box-shadow: 0 0 0 6px rgba(167,139,250,0); }
      100%{ box-shadow: 0 0 0 0 rgba(167,139,250,0); }
    }

    /* ── Sessions tab ── */
    .sessions-list { display: flex; flex-direction: column; gap: 8px; }
    .session-row { background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 10; }
    .session-row.active { border-color: rgba(124,58,237,0.4); }
    .session-info { min-width: 0; }
    .session-label { font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 6px; }
    .session-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .badge-active { font-size: 10px; padding: 2px 7px; border-radius: 20px;
      background: rgba(167,139,250,0.15); color: #a78bfa; border: 1px solid rgba(167,139,250,0.35);
      font-weight: 700; }
    .session-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* ── Status message ── */
    .status-message { min-height: 18px; font-size: 12px; border-radius: 4px; padding: 4px 8px; text-align: center; }
    .status-message.success { color: var(--success); }
    .status-message.error   { color: var(--error); }
    .loading-hint { font-size: 12px; color: var(--muted); }

    .empty-hint { color: var(--muted); font-size: 13px; text-align: center; padding: 24px 0; }
    .section-actions { display: flex; gap: 8px; margin-bottom: 14px; }
  </style>
</head>
<body>
  <div class="container">

    <!-- Tab bar -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="settings">⚙ Settings</button>
      <button class="tab-btn" data-tab="sessions">📋 Sessions</button>
    </div>

    <!-- ── SETTINGS TAB ────────────────────────────────── -->
    <div class="tab-panel active" id="tab-settings">

      <div class="field">
        <label>Supabase Status</label>
        <span class="connection-badge" id="supabaseBadge">
          <span class="status-dot"></span>
          <span id="supabaseStatusText">Waiting…</span>
        </span>
        <span class="loading-hint" id="supabaseErrorHint" style="color:var(--error);display:none;"></span>
      </div>

      <div class="field">
        <label for="communitySelect">Your Community</label>
        <select id="communitySelect" disabled>
          <option value="">Loading communities…</option>
        </select>
        <span class="loading-hint" id="loadingHint"></span>
      </div>

      <div class="field">
        <label>Queue Mode</label>
        <div class="mode-toggle">
          <button id="modeConfirm" class="active" type="button">Confirm</button>
          <button id="modeAuto" type="button">Auto-Queue</button>
        </div>
        <span class="field-hint">
          <strong>Confirm:</strong> songs wait for approval in Queue Manager.<br/>
          <strong>Auto:</strong> songs go straight to KaraFun.
        </span>
      </div>

      <div class="field" id="sessionSection">
        <label>Tonight's Session</label>
        <div id="sessionIdle">
          <p class="field-hint" style="margin-bottom:8px">
            Start a session so singers at this venue can submit songs directly to you.
          </p>
          <input class="session-input" id="hostNameInput" type="text" placeholder="Your name / KJ handle" />
          <input class="session-input" id="venueInput"    type="text" placeholder="Venue (e.g. The Rustic)" />
          <button class="btn-session" id="startSessionBtn" type="button" disabled>▶ Start Session</button>
        </div>
        <div id="sessionActive" style="display:none">
          <div class="session-badge">
            <span class="session-dot"></span>
            <span id="sessionBadgeText">Session active</span>
          </div>
          <div class="field-hint" id="sessionMeta" style="margin:6px 0 10px"></div>
          <button class="btn-end-session" id="endSessionBtn" type="button">■ End Session</button>
        </div>
      </div>

      <div class="status-message" id="statusMsg"></div>
      <button class="btn-save" id="saveBtn" type="button" disabled>Save Settings</button>

    </div><!-- /tab-settings -->

    <!-- ── SESSIONS TAB ─────────────────────────────────── -->
    <div class="tab-panel" id="tab-sessions">

      <div class="section-actions">
        <button class="btn btn-primary" id="refreshSessionsBtn" type="button">↺ Refresh</button>
      </div>

      <div id="sessionsContent">
        <p class="empty-hint">Loading…</p>
      </div>

    </div><!-- /tab-sessions -->

  </div><!-- /container -->

  <script>
    const $ = (id) => document.getElementById(id);
    let selectedMode = 'confirm';

    // ── Tab switching ────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        $('tab-' + btn.dataset.tab).classList.add('active');
        if (btn.dataset.tab === 'sessions') loadSessions();
      });
    });

    // ── Supabase status ──────────────────────────────────
    function updateSupabaseStatus(s) {
      const badge = $('supabaseBadge'), text = $('supabaseStatusText'), errHint = $('supabaseErrorHint');
      if (!s || !s.supabaseStatus) { badge.className = 'connection-badge'; text.textContent = 'Not started'; errHint.style.display = 'none'; return; }
      const raw = s.supabaseStatus;
      if (raw === 'SUBSCRIBED') {
        badge.className = 'connection-badge connected'; text.textContent = '✓ Connected'; errHint.style.display = 'none';
      } else if (raw === 'CHANNEL_ERROR') {
        badge.className = 'connection-badge error'; text.textContent = 'Channel Error';
        if (s.supabaseError) { errHint.textContent = s.supabaseError; errHint.style.display = ''; } else errHint.style.display = 'none';
      } else if (raw === 'TIMED_OUT') {
        badge.className = 'connection-badge error'; text.textContent = 'Timed Out'; errHint.style.display = 'none';
      } else {
        badge.className = 'connection-badge connecting'; text.textContent = raw; errHint.style.display = 'none';
      }
    }
    if (window.bridge && window.bridge.onStatusUpdated) {
      window.bridge.onStatusUpdated((s) => { updateSupabaseStatus(s); renderSession(s); });
    }

    // ── Communities ──────────────────────────────────────
    async function loadCommunities() {
      $('loadingHint').textContent = 'Loading communities…';
      const result = await window.bridge.getCommunities();
      if (!result.ok) { $('loadingHint').textContent = 'Could not load: ' + result.error; return; }
      const select = $('communitySelect');
      select.innerHTML = '<option value="">— select your community —</option>';
      result.communities.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id; opt.textContent = c.name;
        select.appendChild(opt);
      });
      select.disabled = false; $('saveBtn').disabled = false; $('loadingHint').textContent = '';
      const s = await window.bridge.getSettings();
      selectedMode = s.mode || 'confirm'; updateModeButtons();
      if (s.communityId) {
        select.value = s.communityId;
        $('startSessionBtn').disabled = _sessionActive || !select.value;
      }
    }
    loadCommunities();

    // ── Mode toggle ──────────────────────────────────────
    function updateModeButtons() {
      $('modeConfirm').className = selectedMode === 'confirm' ? 'active' : '';
      $('modeAuto').className    = selectedMode === 'auto'    ? 'active' : '';
    }
    $('modeConfirm').addEventListener('click', () => { selectedMode = 'confirm'; updateModeButtons(); });
    $('modeAuto').addEventListener('click',    () => { selectedMode = 'auto';    updateModeButtons(); });

    // ── Session management (Settings tab) ────────────────
    let _sessionActive = false;
    function renderSession(s) {
      _sessionActive = !!(s && s.sessionId);
      $('sessionIdle').style.display   = _sessionActive ? 'none' : '';
      $('sessionActive').style.display = _sessionActive ? ''     : 'none';
      if (_sessionActive) {
        const parts = [];
        if (s.sessionHostName) parts.push('KJ: ' + s.sessionHostName);
        if (s.sessionVenue)    parts.push('@ ' + s.sessionVenue);
        if (s.sessionStarted) {
          const d = new Date(s.sessionStarted);
          parts.push('started ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
        }
        $('sessionBadgeText').textContent = parts.length ? parts.join(' · ') : 'Session active';
        $('sessionMeta').textContent = 'Singers can now submit songs directly to this session.';
      }
      if ($('communitySelect').value) $('startSessionBtn').disabled = _sessionActive;
    }

    window.addEventListener('DOMContentLoaded', async () => {
      if (window.bridge && window.bridge.getStatus) {
        const s = await window.bridge.getStatus();
        updateSupabaseStatus(s); renderSession(s);
      }
    });

    $('communitySelect').addEventListener('change', () => {
      $('startSessionBtn').disabled = _sessionActive || !$('communitySelect').value;
    });

    $('startSessionBtn').addEventListener('click', async () => {
      const hostName = $('hostNameInput').value.trim();
      const venue    = $('venueInput').value.trim();
      $('startSessionBtn').disabled = true;
      $('startSessionBtn').textContent = 'Starting…';
      const result = await window.bridge.startSession({ hostName, venue });
      $('startSessionBtn').textContent = '▶ Start Session';
      if (result && result.ok) {
        showStatus('✓ Session started!', 'success');
      } else {
        $('startSessionBtn').disabled = false;
        showStatus('Error: ' + (result ? result.error : 'Unknown'), 'error');
      }
    });

    $('endSessionBtn').addEventListener('click', async () => {
      if (!confirm('End this session? Pending submissions will be cancelled.')) return;
      $('endSessionBtn').disabled = true; $('endSessionBtn').textContent = 'Ending…';
      const result = await window.bridge.endSession();
      $('endSessionBtn').disabled = false; $('endSessionBtn').textContent = '■ End Session';
      if (!result || !result.ok) showStatus('Error: ' + (result ? result.error : 'Unknown'), 'error');
    });

    $('saveBtn').addEventListener('click', async () => {
      const communityId = $('communitySelect').value;
      if (!communityId) { showStatus('Please select a community.', 'error'); return; }
      $('saveBtn').disabled = true; $('saveBtn').textContent = 'Saving…';
      const result = await window.bridge.saveSettings({ communityId, mode: selectedMode });
      $('saveBtn').disabled = false; $('saveBtn').textContent = 'Save Settings';
      if (result && result.ok) showStatus('✓ Settings saved!', 'success');
      else showStatus('Error: ' + (result ? result.error : 'Unknown'), 'error');
    });

    function showStatus(msg, type) {
      const el = $('statusMsg');
      el.textContent = msg; el.className = 'status-message ' + type;
      setTimeout(() => { el.textContent = ''; el.className = 'status-message'; }, 5000);
    }

    // ── Sessions tab ─────────────────────────────────────
    let _confirmingId = null;

    async function loadSessions() {
      const content = $('sessionsContent');
      content.innerHTML = '<p class="empty-hint">Loading…</p>';
      _confirmingId = null;
      const result = await window.bridge.listSessions();
      if (!result.ok || result.sessions.length === 0) {
        content.innerHTML = '<p class="empty-hint">' + (result.ok ? 'No sessions found.' : 'Error: ' + result.error) + '</p>';
        return;
      }
      renderSessions(result.sessions);
    }

    function renderSessions(sessions) {
      const content = $('sessionsContent');
      content.innerHTML = '';
      const list = document.createElement('div');
      list.className = 'sessions-list';

      sessions.forEach(s => {
        const isActive = s.status === 'active';
        const started  = s.started_at ? new Date(s.started_at).toLocaleString([], { dateStyle: 'short', timeStyle: 'short' }) : '—';
        const ended    = s.ended_at   ? new Date(s.ended_at).toLocaleString([], { dateStyle: 'short', timeStyle: 'short' }) : null;
        const label    = [s.host_name, s.venue ? '@ ' + s.venue : null].filter(Boolean).join(' ') || 'Unnamed session';

        const row = document.createElement('div');
        row.className = 'session-row' + (isActive ? ' active' : '');
        row.dataset.id = s.id;

        row.innerHTML = `
          <div class="session-info">
            <div class="session-label">
              ${isActive ? '<span class="badge-active">ACTIVE</span>' : ''}
              ${escHtml(label)}
            </div>
            <div class="session-meta">
              Started ${escHtml(started)}${ended ? ' · Ended ' + escHtml(ended) : ''}
            </div>
          </div>
          <div class="session-actions" id="actions-${s.id}"></div>
        `;
        list.appendChild(row);
        renderSessionActions(s.id, isActive);
      });

      content.appendChild(list);
    }

    function renderSessionActions(id, isActive) {
      const el = $('actions-' + id);
      if (!el) return;
      el.innerHTML = '';
      if (_confirmingId === id) {
        const confirmBtn = document.createElement('button');
        confirmBtn.className = 'btn btn-danger';
        confirmBtn.textContent = isActive ? 'Confirm End' : 'Confirm Delete';
        confirmBtn.addEventListener('click', async () => {
          confirmBtn.disabled = true; confirmBtn.textContent = '…';
          if (isActive) await window.bridge.endSessionById(id);
          else          await window.bridge.deleteSessionById(id);
          _confirmingId = null;
          loadSessions();
        });
        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'btn btn-ghost';
        cancelBtn.textContent = 'Cancel';
        cancelBtn.style.marginLeft = '6px';
        cancelBtn.addEventListener('click', () => { _confirmingId = null; loadSessions(); });
        el.appendChild(confirmBtn);
        el.appendChild(cancelBtn);
      } else if (isActive) {
        const endBtn = document.createElement('button');
        endBtn.className = 'btn btn-ghost';
        endBtn.textContent = 'End';
        endBtn.addEventListener('click', () => { _confirmingId = id; loadSessions(); });
        el.appendChild(endBtn);
      } else {
        const delBtn = document.createElement('button');
        delBtn.className = 'btn btn-danger';
        delBtn.textContent = '🗑 Delete';
        delBtn.addEventListener('click', () => { _confirmingId = id; loadSessions(); });
        el.appendChild(delBtn);
      }
    }

    $('refreshSessionsBtn').addEventListener('click', loadSessions);

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
