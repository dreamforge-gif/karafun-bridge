<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
  <title>Settings — Karafun Bridge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1a2e;
      --surface:  #16213e;
      --border:   #2a2a4a;
      --brand:    #e85d26;
      --brand-dk: #c44d1e;
      --text:     #e8e8f0;
      --muted:    #8888aa;
      --success:  #22c55e;
      --error:    #ef4444;
      --radius:   8px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 24px;
    }

    header {
      margin-bottom: 28px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    header p {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .form-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }

    select:focus { border-color: var(--brand); }
    select:disabled { opacity: 0.5; }

    select option {
      background: var(--surface);
      color: var(--text);
    }

    .field-hint {
      font-size: 11px;
      color: var(--muted);
    }

    .mode-toggle {
      display: flex;
      gap: 0;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .mode-toggle button {
      flex: 1;
      padding: 10px;
      background: var(--surface);
      color: var(--muted);
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }

    .mode-toggle button.active {
      background: var(--brand);
      color: #fff;
    }

    .mode-toggle button:not(.active):hover {
      background: var(--border);
      color: var(--text);
    }

    footer {
      padding-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-save {
      width: 100%;
      padding: 12px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn-save:hover { background: var(--brand-dk); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

    .status-message {
      min-height: 20px;
      text-align: center;
      font-size: 12px;
      border-radius: 4px;
      padding: 4px 8px;
    }
    .status-message.success { color: var(--success); }
    .status-message.error   { color: var(--error); }

    .loading-hint {
      font-size: 12px;
      color: var(--muted);
    }

    .connection-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
    }
    .connection-badge.connected  { color: var(--success); border-color: rgba(34,197,94,0.3);  background: rgba(34,197,94,0.08); }
    .connection-badge.error      { color: var(--error);   border-color: rgba(239,68,68,0.3);   background: rgba(239,68,68,0.08); }
    .connection-badge.connecting { color: #f59e0b;        border-color: rgba(245,158,11,0.3);  background: rgba(245,158,11,0.08); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Karafun Bridge Settings</h1>
      <p>Select your community and queue mode.</p>
    </header>

    <div class="form-body">
      <!-- Live connection status -->
      <div class="field">
        <label>Supabase Status</label>
        <span class="connection-badge" id="supabaseBadge">
          <span class="status-dot"></span>
          <span id="supabaseStatusText">Waiting…</span>
        </span>
        <span class="loading-hint" id="supabaseErrorHint" style="color:var(--error);display:none;"></span>
      </div>

      <!-- Community -->
      <div class="field">
        <label for="communitySelect">Your Community</label>
        <select id="communitySelect" disabled>
          <option value="">Loading communities…</option>
        </select>
        <span class="loading-hint" id="loadingHint"></span>
      </div>

      <!-- Mode -->
      <div class="field">
        <label>Queue Mode</label>
        <div class="mode-toggle">
          <button id="modeConfirm" class="active" type="button">Confirm</button>
          <button id="modeAuto" type="button">Auto-Queue</button>
        </div>
        <span class="field-hint">
          <strong>Confirm:</strong> new songs wait for your approval in the Queue Manager.<br/>
          <strong>Auto:</strong> songs are added to Karafun immediately.
        </span>
      </div>
    </div>

    <footer>
      <div class="status-message" id="statusMsg"></div>
      <button class="btn-save" id="saveBtn" type="button" disabled>Save Settings</button>
    </footer>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let selectedMode = 'confirm';

    // ── Live Supabase status ─────────────────────────────────────────────────
    function updateSupabaseStatus(s) {
      const badge   = $('supabaseBadge');
      const text    = $('supabaseStatusText');
      const errHint = $('supabaseErrorHint');
      if (!s || !s.supabaseStatus) {
        badge.className = 'connection-badge';
        text.textContent = 'Not started';
        errHint.style.display = 'none';
        return;
      }
      const raw = s.supabaseStatus;
      if (raw === 'SUBSCRIBED') {
        badge.className = 'connection-badge connected';
        text.textContent = '✓ Connected';
        errHint.style.display = 'none';
      } else if (raw === 'CHANNEL_ERROR') {
        badge.className = 'connection-badge error';
        text.textContent = 'Channel Error';
        if (s.supabaseError) { errHint.textContent = s.supabaseError; errHint.style.display = ''; }
        else { errHint.style.display = 'none'; }
      } else if (raw === 'TIMED_OUT') {
        badge.className = 'connection-badge error';
        text.textContent = 'Timed Out';
        errHint.style.display = 'none';
      } else {
        badge.className = 'connection-badge connecting';
        text.textContent = raw;
        errHint.style.display = 'none';
      }
    }

    // Listen for status broadcasts from main process
    if (window.bridge && window.bridge.onStatusUpdated) {
      window.bridge.onStatusUpdated((s) => updateSupabaseStatus(s));
    }

    // Also pull current status on load
    window.addEventListener('DOMContentLoaded', async () => {
      if (window.bridge && window.bridge.getStatus) {
        const s = await window.bridge.getStatus();
        updateSupabaseStatus(s);
      }
    });

    // ── Auto-load communities on open ────────────────────────────────────────
    async function loadCommunities() {
      $('loadingHint').textContent = 'Loading communities…';
      const result = await window.bridge.getCommunities();

      if (!result.ok) {
        $('loadingHint').textContent = 'Could not load communities: ' + result.error;
        return;
      }

      const select = $('communitySelect');
      select.innerHTML = '<option value="">— select your community —</option>';
      result.communities.forEach((c) => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.name;
        select.appendChild(opt);
      });
      select.disabled = false;
      $('saveBtn').disabled = false;
      $('loadingHint').textContent = '';

      // Re-select previously saved community
      const s = await window.bridge.getSettings();
      selectedMode = s.mode || 'confirm';
      updateModeButtons();

      if (s.communityId) {
        select.value = s.communityId;
      }
    }

    loadCommunities();

    // ── Mode toggle ──────────────────────────────────────────────────────────
    function updateModeButtons() {
      $('modeConfirm').className = selectedMode === 'confirm' ? 'active' : '';
      $('modeAuto').className = selectedMode === 'auto' ? 'active' : '';
    }

    $('modeConfirm').addEventListener('click', () => { selectedMode = 'confirm'; updateModeButtons(); });
    $('modeAuto').addEventListener('click', () => { selectedMode = 'auto'; updateModeButtons(); });

    // ── Save ─────────────────────────────────────────────────────────────────
    $('saveBtn').addEventListener('click', async () => {
      const communityId = $('communitySelect').value;

      if (!communityId) {
        showStatus('Please select a community.', 'error');
        return;
      }

      $('saveBtn').disabled = true;
      $('saveBtn').textContent = 'Saving…';

      const result = await window.bridge.saveSettings({ communityId, mode: selectedMode });

      $('saveBtn').disabled = false;
      $('saveBtn').textContent = 'Save Settings';

      if (result && result.ok) {
        showStatus('✓ Settings saved!', 'success');
      } else {
        showStatus('Error: ' + (result ? result.error : 'Unknown error'), 'error');
      }
    });

    function showStatus(msg, type) {
      const el = $('statusMsg');
      el.textContent = msg;
      el.className = 'status-message ' + type;
      setTimeout(() => { el.textContent = ''; el.className = 'status-message'; }, 5000);
    }
  </script>
</body>
</html>
